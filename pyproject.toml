[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "smolvm"
dynamic = ["version"]
description = "Secure runtime for AI agents, and tools -- free and open-source from Celesto AI 🧡"
readme = "README.md"
license = "Apache-2.0"
requires-python = ">=3.10"
authors = [
    { name = "Celesto AI", email = "hello@celesto.ai" }
]
classifiers = [
    "Development Status :: 3 - Alpha",
    "Intended Audience :: Developers",
    "License :: OSI Approved :: Apache Software License",
    "Operating System :: MacOS :: MacOS X",
    "Operating System :: POSIX :: Linux",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.10",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "Programming Language :: Python :: 3.13",
    "Programming Language :: Python :: 3.14",
    "Topic :: System :: Emulators",
]
dependencies = [
    "paramiko>=3.0",
    "pycdlib>=1.14.0",
    "pydantic>=2.0",
    "rich>=13.0",
    "requests>=2.28",
    "requests-unixsocket>=0.3",
]

[project.optional-dependencies]
dev = [
    "pytest>=7.0",
    "pytest-cov>=4.0",
    "ruff>=0.15.0",
    "mypy>=1.0",
    "pre-commit>=4.2.0",
]
dashboard = [
    "fastapi>=0.115.0",
    "uvicorn[standard]>=0.34.0",
    "websockets>=14.0",
]
examples = [
    "langchain",
    "langchain-openai",
    "openai",
    "openai-agents",
    "playwright",
    "pydantic-ai",
]
all = [
    "fastapi>=0.115.0",
    "uvicorn[standard]>=0.34.0",
    "websockets>=14.0",
    "langchain",
    "langchain-openai",
    "openai",
    "openai-agents",
    "playwright",
    "pydantic-ai",
]

[project.scripts]
smolvm = "smolvm.cli:main"
smolvm-cleanup = "smolvm.cleanup:main"

[tool.hatch.build.targets.wheel]
packages = ["src/smolvm"]

[tool.hatch.build.targets.wheel.force-include]
"scripts/system-setup.sh" = "src/smolvm/_setup_assets/system-setup.sh"
"scripts/system-setup-macos.sh" = "src/smolvm/_setup_assets/system-setup-macos.sh"
"scripts/internal/install-firecracker.sh" = "src/smolvm/_setup_assets/internal/install-firecracker.sh"
"scripts/internal/configure-runtime-sudoers.sh" = "src/smolvm/_setup_assets/internal/configure-runtime-sudoers.sh"
"scripts/internal/image-build-loopfs.sh" = "src/smolvm/_setup_assets/internal/image-build-loopfs.sh"

[tool.hatch.build]
exclude = [
    "/ui",
]

[tool.hatch.version]
path = "src/smolvm/__init__.py"

[tool.ruff]
target-version = "py310"
line-length = 100

[tool.ruff.lint]
select = ["E", "F", "I", "N", "W", "UP", "B", "C4", "SIM"]

[tool.mypy]
python_version = "3.10"
strict = true
warn_return_any = true
warn_unused_ignores = true

[tool.pytest.ini_options]
testpaths = ["tests"]
addopts = "-v --tb=short"
