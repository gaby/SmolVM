# Build SmolVM preset images and upload them to a draft GitHub Release.
#
# Two-stage layered build:
#   1. base-rootfs: builds a shared Ubuntu 24.04 rootfs with Node 22,
#      Python 3, uv, git, curl, openssh — once per architecture.
#   2. preset: layers the preset-specific install on top of the base
#      rootfs (npm install, git clone, etc.) — one job per (preset, arch).
#
# The layered approach means adding a new preset costs ~60s of CI time
# (just the npm install / pip install), not ~5 min (full apt + Node setup).
# The base rootfs is passed between stages as a GitHub Actions artifact.
#
# The release stays in DRAFT until a human reviews and publishes it. Drafts
# are invisible to the public and freely deletable, so re-runs and experiments
# are safe.
#
# Manual trigger only for now. Future PRs add: cosign keyless signing of each
# uploaded asset, an auto-generated PR that populates MANIFEST in published.py
# with the new (URL, SHA, size) tuples, and possibly a tag-driven trigger so
# CLI releases auto-build their image set.

name: Build Published Images

on:
  workflow_dispatch:
    inputs:
      presets:
        description: >-
          Comma-separated presets to build (e.g. "openclaw,codex,claude-code").
          Use "all" to build every preset.
        type: string
        default: "all"
      release_tag:
        description: >-
          Release tag (e.g. images-2026.06.12.0). Created as draft if missing.
          Leave empty to use IMAGES_RELEASE_TAG from published.py.
        type: string
        default: ""
      force_overwrite:
        description: >-
          DANGEROUS. Replace any assets with the same name that already
          live at this tag. Default false: the upload step fails loud on
          a collision so an accidental re-run cannot silently swap
          published bytes the shipped CLI's MANIFEST SHAs depend on.
          Tick this only for an intentional re-bake of the same tag
          (e.g. a flaky CI run that needs a redo).
        type: boolean
        default: false

permissions:
  contents: write  # required to create/upload to GitHub Releases

jobs:
  # ── Stage 1: Build shared base rootfs (once per arch) ─────────
  #
  # Skipped when only openclaw is requested — openclaw uses its own
  # builder and doesn't consume the layered base, so building it in
  # that case just wastes 3-5 min of runner time per arch.
  base-rootfs:
    if: ${{ inputs.presets != 'openclaw' }}
    strategy:
      fail-fast: false
      matrix:
        arch: [amd64, arm64]
        # Two flavours per arch: Ubuntu 24.04 (current default) and Alpine
        # 3.20 (smaller footprint, opt-in via ``smolvm <preset> start --os
        # alpine``). Same kernel boots both — only the rootfs differs.
        os: [ubuntu, alpine]
    runs-on: ${{ matrix.arch == 'arm64' && 'ubuntu-24.04-arm' || 'ubuntu-latest' }}
    timeout-minutes: 15

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Confirm Docker is available
        run: docker info >/dev/null

      - name: Build base rootfs
        env:
          OS: ${{ matrix.os }}
        run: |
          sudo OS="$OS" bash scripts/ci/build-base-rootfs.sh /tmp/base

      - name: Upload base rootfs artifact
        uses: actions/upload-artifact@v4
        with:
          name: base-rootfs-${{ matrix.os }}-${{ matrix.arch }}
          path: /tmp/base/base-rootfs.ext4
          retention-days: 1

  # ── Standalone Rust guest-agent binaries ─────────────────────
  #
  # Rootfs jobs bake this same binary into /usr/local/bin. Uploading it once
  # per architecture gives users and production builders a provenance/debug
  # artifact without making the private Celesto repo the source of truth.
  guest-agent-binaries:
    strategy:
      fail-fast: false
      matrix:
        arch: [amd64, arm64]
    runs-on: ${{ matrix.arch == 'arm64' && 'ubuntu-24.04-arm' || 'ubuntu-latest' }}
    timeout-minutes: 10

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Install Rust musl target
        env:
          ARCH: ${{ matrix.arch }}
        run: |
          case "$ARCH" in
            amd64) target="x86_64-unknown-linux-musl" ;;
            arm64) target="aarch64-unknown-linux-musl" ;;
            *) echo "Unsupported arch: $ARCH" >&2; exit 1 ;;
          esac
          rustup target add "$target"

      - name: Cache Rust build
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: rust-${{ runner.os }}-${{ matrix.arch }}-${{ hashFiles('Cargo.lock', 'Cargo.toml', 'smolvm-core/Cargo.toml', 'guest-agent/Cargo.toml') }}
          restore-keys: rust-${{ runner.os }}-${{ matrix.arch }}-

      - name: Resolve release tag
        id: release
        env:
          INPUT_TAG: ${{ inputs.release_tag }}
        run: |
          if [ -n "$INPUT_TAG" ]; then
            tag="$INPUT_TAG"
          else
            # Single source of truth — published.py::IMAGES_RELEASE_TAG.
            # Read as string rather than importing: avoids forcing every
            # job to install smolvm's Python deps just to print one tag.
            tag=$(awk -F'"' '/^IMAGES_RELEASE_TAG[[:space:]]*=/{print $2; exit}' src/smolvm/images/published.py)
          fi
          if [ -z "$tag" ]; then
            echo "ERROR: IMAGES_RELEASE_TAG could not be parsed from src/smolvm/images/published.py" >&2
            exit 1
          fi
          echo "tag=${tag}" >> "$GITHUB_OUTPUT"
          echo "Release tag: ${tag}"

      - name: Build Rust guest agent
        id: build
        env:
          ARCH: ${{ matrix.arch }}
        run: |
          case "$ARCH" in
            amd64)
              target="x86_64-unknown-linux-musl"
              asset_name="smolvm-guest-agent-linux-amd64"
              ;;
            arm64)
              target="aarch64-unknown-linux-musl"
              asset_name="smolvm-guest-agent-linux-arm64"
              ;;
            *) echo "Unsupported arch: $ARCH" >&2; exit 1 ;;
          esac
          cargo build --release --target "$target" -p smolvm-guest-agent
          cp "target/${target}/release/smolvm-guest-agent" "$asset_name"
          chmod 0755 "$asset_name"
          echo "asset_name=${asset_name}" >> "$GITHUB_OUTPUT"

      - name: Compute SHA-256
        id: sha
        env:
          ASSET_NAME: ${{ steps.build.outputs.asset_name }}
        run: |
          binary_sha=$(sha256sum "$ASSET_NAME" | cut -d' ' -f1)
          binary_size=$(stat -c '%s' "$ASSET_NAME")
          printf '%s  %s\n' "$binary_sha" "$ASSET_NAME" > "${ASSET_NAME}.sha256"
          {
            echo "binary_sha=${binary_sha}"
            echo "binary_size=${binary_size}"
          } >> "$GITHUB_OUTPUT"

      - name: Upload to GitHub Releases (draft)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ steps.release.outputs.tag }}
          ASSET_NAME: ${{ steps.build.outputs.asset_name }}
          FORCE_OVERWRITE: ${{ inputs.force_overwrite }}
        run: |
          if ! gh release view "$TAG" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
            gh release create "$TAG" \
              --repo "$GITHUB_REPOSITORY" \
              --draft \
              --title "Published images $TAG" \
              --notes "Auto-generated draft release for SmolVM published images. Verify SHA-256 sums and content before publishing." \
              || echo "Draft already exists (race with another matrix cell), continuing."
          fi

          upload_args=()
          if [ "${FORCE_OVERWRITE:-false}" = "true" ]; then
            upload_args+=(--clobber)
          fi
          gh release upload "$TAG" \
            --repo "$GITHUB_REPOSITORY" \
            "${upload_args[@]}" \
            "$ASSET_NAME" \
            "${ASSET_NAME}.sha256"

      - name: Step summary
        env:
          ASSET_NAME: ${{ steps.build.outputs.asset_name }}
          TAG: ${{ steps.release.outputs.tag }}
          BINARY_SHA: ${{ steps.sha.outputs.binary_sha }}
          BINARY_SIZE: ${{ steps.sha.outputs.binary_size }}
        run: |
          {
            echo "## Guest agent binary: \`${ASSET_NAME}\`"
            echo ""
            echo "Uploaded to draft release [\`${TAG}\`](https://github.com/${GITHUB_REPOSITORY}/releases/tag/${TAG})."
            echo ""
            echo "| File | Size | SHA-256 |"
            echo "| --- | --- | --- |"
            echo "| ${ASSET_NAME} | $(numfmt --to=iec-i --suffix=B ${BINARY_SIZE}) | \`${BINARY_SHA}\` |"
          } >> "$GITHUB_STEP_SUMMARY"

  # ── Stage 2a: Build openclaw (custom builder, not layered) ────
  #
  # openclaw has a custom init script, device-approver sidecar, and
  # systemctl proxy that its Dockerfile bakes in. It uses
  # builder.build_openclaw_rootfs() rather than the layered path.
  openclaw:
    strategy:
      fail-fast: false
      matrix:
        arch: [amd64, arm64]
    runs-on: ${{ matrix.arch == 'arm64' && 'ubuntu-24.04-arm' || 'ubuntu-latest' }}
    timeout-minutes: 30

    steps:
      - name: Check preset filter
        id: filter
        env:
          INPUT_PRESETS: ${{ inputs.presets }}
        run: |
          # Strip whitespace so "openclaw, codex" matches "openclaw".
          normalized=$(printf '%s' "$INPUT_PRESETS" | tr -d '[:space:]')
          if [ "$normalized" = "all" ] || echo ",$normalized," | grep -q ",openclaw,"; then
            echo "skip=false" >> "$GITHUB_OUTPUT"
          else
            echo "skip=true" >> "$GITHUB_OUTPUT"
            echo "Skipping openclaw (not in filter: $INPUT_PRESETS)"
          fi

      - name: Check out repository
        if: steps.filter.outputs.skip != 'true'
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Set up Python 3.13
        if: steps.filter.outputs.skip != 'true'
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install Rust toolchain
        if: steps.filter.outputs.skip != 'true'
        uses: dtolnay/rust-toolchain@stable

      - name: Install Rust musl target
        if: steps.filter.outputs.skip != 'true'
        env:
          ARCH: ${{ matrix.arch }}
        run: |
          case "$ARCH" in
            amd64) target="x86_64-unknown-linux-musl" ;;
            arm64) target="aarch64-unknown-linux-musl" ;;
            *) echo "Unsupported arch: $ARCH" >&2; exit 1 ;;
          esac
          rustup target add "$target"

      - name: Cache Rust build
        if: steps.filter.outputs.skip != 'true'
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: rust-${{ runner.os }}-${{ matrix.arch }}-${{ hashFiles('Cargo.lock', 'Cargo.toml', 'smolvm-core/Cargo.toml', 'guest-agent/Cargo.toml') }}
          restore-keys: rust-${{ runner.os }}-${{ matrix.arch }}-

      - name: Install uv
        if: steps.filter.outputs.skip != 'true'
        uses: astral-sh/setup-uv@caf0cab7a618c569241d31dcd442f54681755d39 # v3.2.4

      - name: Install dependencies
        if: steps.filter.outputs.skip != 'true'
        run: uv sync --extra dev

      - name: Confirm Docker is available
        if: steps.filter.outputs.skip != 'true'
        run: docker info >/dev/null

      - name: Resolve release tag
        if: steps.filter.outputs.skip != 'true'
        id: release
        env:
          INPUT_TAG: ${{ inputs.release_tag }}
        run: |
          if [ -n "$INPUT_TAG" ]; then
            tag="$INPUT_TAG"
          else
            # Single source of truth — published.py::IMAGES_RELEASE_TAG.
            # Read as string rather than importing: avoids forcing every
            # job to install smolvm's Python deps just to print one tag.
            tag=$(awk -F'"' '/^IMAGES_RELEASE_TAG[[:space:]]*=/{print $2; exit}' src/smolvm/images/published.py)
          fi
          if [ -z "$tag" ]; then
            echo "ERROR: IMAGES_RELEASE_TAG could not be parsed from src/smolvm/images/published.py" >&2
            exit 1
          fi
          echo "tag=${tag}" >> "$GITHUB_OUTPUT"
          echo "Release tag: ${tag}"

      - name: Build openclaw image
        if: steps.filter.outputs.skip != 'true'
        id: build
        env:
          ARCH: ${{ matrix.arch }}
        run: |
          uv run python <<'PY'
          import os
          from pathlib import Path
          from smolvm.images.builder import ImageBuilder

          arch = os.environ["ARCH"]
          name = f"openclaw-{arch}"

          builder = ImageBuilder()
          kernel, rootfs = builder.build_openclaw_rootfs(
              name=name,
              rootfs_size_mb=4096,
          )

          with Path(os.environ["GITHUB_OUTPUT"]).open("a", encoding="utf-8") as fh:
              fh.write(f"rootfs_path={rootfs}\n")
              fh.write(f"name={name}\n")
          print(f"rootfs: {rootfs} ({rootfs.stat().st_size:,} bytes)")
          PY

      - name: Stage release assets
        if: steps.filter.outputs.skip != 'true'
        id: stage
        env:
          NAME: ${{ steps.build.outputs.name }}
          ROOTFS_PATH: ${{ steps.build.outputs.rootfs_path }}
        run: |
          zstd -19 -T0 --rm -o "${NAME}-rootfs.ext4.zst" "$ROOTFS_PATH"
          ls -lh "${NAME}-rootfs.ext4.zst"

      - name: Compute SHA-256
        if: steps.filter.outputs.skip != 'true'
        id: sha
        env:
          NAME: ${{ steps.build.outputs.name }}
        run: |
          rootfs_sha=$(sha256sum "${NAME}-rootfs.ext4.zst" | cut -d' ' -f1)
          rootfs_size=$(stat -c '%s' "${NAME}-rootfs.ext4.zst")
          {
            echo "rootfs_sha=${rootfs_sha}"
            echo "rootfs_size=${rootfs_size}"
          } >> "$GITHUB_OUTPUT"

      - name: Upload to GitHub Releases (draft)
        if: steps.filter.outputs.skip != 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ steps.release.outputs.tag }}
          NAME: ${{ steps.build.outputs.name }}
          FORCE_OVERWRITE: ${{ inputs.force_overwrite }}
        run: |
          if ! gh release view "$TAG" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
            gh release create "$TAG" \
              --repo "$GITHUB_REPOSITORY" \
              --draft \
              --title "Published images $TAG" \
              --notes "Auto-generated draft release for SmolVM published images. Verify SHA-256 sums and content before publishing." \
              || echo "Draft already exists (race with another matrix cell), continuing."
          fi

          # Default (no --clobber): `gh release upload` returns non-zero
          # on a same-name collision. Forces the dev to bump
          # IMAGES_RELEASE_TAG (or pass a fresh `release_tag` input)
          # rather than silently swapping published bytes that the
          # shipped CLI's MANIFEST SHAs depend on.
          # `force_overwrite=true` opts back in for intentional re-bakes.
          upload_args=()
          if [ "${FORCE_OVERWRITE:-false}" = "true" ]; then
            upload_args+=(--clobber)
          fi
          gh release upload "$TAG" \
            --repo "$GITHUB_REPOSITORY" \
            "${upload_args[@]}" \
            "${NAME}-rootfs.ext4.zst"

      - name: Step summary
        if: steps.filter.outputs.skip != 'true'
        env:
          NAME: ${{ steps.build.outputs.name }}
          TAG: ${{ steps.release.outputs.tag }}
          ROOTFS_SHA: ${{ steps.sha.outputs.rootfs_sha }}
          ROOTFS_SIZE: ${{ steps.sha.outputs.rootfs_size }}
        run: |
          {
            echo "## Build summary: \`${NAME}\`"
            echo ""
            echo "Uploaded to draft release [\`${TAG}\`](https://github.com/${GITHUB_REPOSITORY}/releases/tag/${TAG})."
            echo ""
            echo "| File | Size | SHA-256 |"
            echo "| --- | --- | --- |"
            echo "| ${NAME}-rootfs.ext4.zst | $(numfmt --to=iec-i --suffix=B ${ROOTFS_SIZE}) | \`${ROOTFS_SHA}\` |"
          } >> "$GITHUB_STEP_SUMMARY"

  # ── Stage 2b: Layer presets on top of base ────────────────────
  #
  # codex, claude-code, hermes, pi use the shared base rootfs.
  # Each job copies the base, chroots in, runs the preset's install.
  preset:
    needs: base-rootfs
    strategy:
      fail-fast: false
      matrix:
        arch: [amd64, arm64]
        # "ubuntu" is the bare base image (no preset install) — gives
        # firecracker a raw-ext4 Ubuntu for `create --os ubuntu`.
        preset: [codex, claude-code, hermes, pi, ubuntu]
        os: [ubuntu, alpine]
        # Phase 1 of the Alpine rollout (#264) excludes hermes — its
        # ``[all]`` extras pull manylinux2014 wheels that don't have
        # musllinux variants, so the install would fall back to slow
        # source builds with sometimes-broken results. Re-enable when
        # we have a curated minimal extras set. The bare "ubuntu" image is
        # Ubuntu-only — there's no bare-Alpine published image yet.
        exclude:
          - preset: hermes
            os: alpine
          - preset: ubuntu
            os: alpine
    runs-on: ${{ matrix.arch == 'arm64' && 'ubuntu-24.04-arm' || 'ubuntu-latest' }}
    timeout-minutes: 20

    steps:
      - name: Check preset filter
        id: filter
        env:
          INPUT_PRESETS: ${{ inputs.presets }}
          PRESET: ${{ matrix.preset }}
        run: |
          # Strip whitespace so "openclaw, codex" matches each preset.
          normalized=$(printf '%s' "$INPUT_PRESETS" | tr -d '[:space:]')
          if [ "$normalized" = "all" ] || echo ",$normalized," | grep -q ",$PRESET,"; then
            echo "skip=false" >> "$GITHUB_OUTPUT"
          else
            echo "skip=true" >> "$GITHUB_OUTPUT"
            echo "Skipping $PRESET (not in filter: $INPUT_PRESETS)"
          fi

      - name: Check out repository
        if: steps.filter.outputs.skip != 'true'
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Install Rust toolchain
        if: steps.filter.outputs.skip != 'true'
        uses: dtolnay/rust-toolchain@stable

      - name: Install Rust musl target
        if: steps.filter.outputs.skip != 'true'
        env:
          ARCH: ${{ matrix.arch }}
        run: |
          case "$ARCH" in
            amd64) target="x86_64-unknown-linux-musl" ;;
            arm64) target="aarch64-unknown-linux-musl" ;;
            *) echo "Unsupported arch: $ARCH" >&2; exit 1 ;;
          esac
          rustup target add "$target"

      - name: Cache Rust build
        if: steps.filter.outputs.skip != 'true'
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: rust-${{ runner.os }}-${{ matrix.arch }}-${{ hashFiles('Cargo.lock', 'Cargo.toml', 'smolvm-core/Cargo.toml', 'guest-agent/Cargo.toml') }}
          restore-keys: rust-${{ runner.os }}-${{ matrix.arch }}-

      - name: Install uv
        if: steps.filter.outputs.skip != 'true'
        uses: astral-sh/setup-uv@caf0cab7a618c569241d31dcd442f54681755d39 # v3.2.4

      - name: Resolve release tag
        if: steps.filter.outputs.skip != 'true'
        id: release
        env:
          INPUT_TAG: ${{ inputs.release_tag }}
        run: |
          if [ -n "$INPUT_TAG" ]; then
            tag="$INPUT_TAG"
          else
            # Single source of truth — published.py::IMAGES_RELEASE_TAG.
            # Read as string rather than importing: avoids forcing every
            # job to install smolvm's Python deps just to print one tag.
            tag=$(awk -F'"' '/^IMAGES_RELEASE_TAG[[:space:]]*=/{print $2; exit}' src/smolvm/images/published.py)
          fi
          if [ -z "$tag" ]; then
            echo "ERROR: IMAGES_RELEASE_TAG could not be parsed from src/smolvm/images/published.py" >&2
            exit 1
          fi
          echo "tag=${tag}" >> "$GITHUB_OUTPUT"
          echo "Release tag: ${tag}"

      - name: Download base rootfs
        if: steps.filter.outputs.skip != 'true'
        uses: actions/download-artifact@v4
        with:
          name: base-rootfs-${{ matrix.os }}-${{ matrix.arch }}
          path: /tmp/base

      - name: Build Rust guest agent
        if: steps.filter.outputs.skip != 'true'
        env:
          ARCH: ${{ matrix.arch }}
        run: |
          case "$ARCH" in
            amd64) target="x86_64-unknown-linux-musl" ;;
            arm64) target="aarch64-unknown-linux-musl" ;;
            *) echo "Unsupported arch: $ARCH" >&2; exit 1 ;;
          esac
          cargo build --release --target "$target" -p smolvm-guest-agent

      - name: Layer preset on base rootfs
        if: steps.filter.outputs.skip != 'true'
        id: build
        env:
          PRESET: ${{ matrix.preset }}
          ARCH: ${{ matrix.arch }}
          OS: ${{ matrix.os }}
        run: |
          # Hermes needs more disk (Python deps are heavier)
          SIZE=4096
          if [ "$PRESET" = "hermes" ]; then
            SIZE=6144
          fi
          # Alpine + JS preset is ~half the Ubuntu equivalent — give it
          # less scratch space so the published artifact stays compact.
          if [ "$OS" = "alpine" ]; then
            SIZE=2048
          fi

          sudo ARCH="$ARCH" OS="$OS" bash scripts/ci/build-preset.sh \
            "$PRESET" /tmp/base/base-rootfs.ext4 /tmp/out "$SIZE"

          # build-preset.sh ran under sudo (mount + chroot need root), so
          # /tmp/out is owned by root. Chown to the runner user so the
          # subsequent zstd `--rm` step can delete the source file.
          sudo chown -R "$(id -u):$(id -g)" /tmp/out

          # Asset naming asymmetry: ubuntu has no OS suffix (legacy from
          # the single-flavour era), alpine introduces ``-alpine-``. The
          # published manifest URL builder mirrors this in
          # ``src/smolvm/images/published.py::_release_asset_url``.
          if [ "$OS" = "ubuntu" ]; then
            name="${PRESET}-${ARCH}"
          else
            name="${PRESET}-${ARCH}-${OS}"
          fi
          rootfs="/tmp/out/${name}-rootfs.ext4"

          echo "rootfs_path=${rootfs}" >> "$GITHUB_OUTPUT"
          echo "name=${name}" >> "$GITHUB_OUTPUT"

      - name: Stage release assets
        if: steps.filter.outputs.skip != 'true'
        id: stage
        env:
          NAME: ${{ steps.build.outputs.name }}
          ROOTFS_PATH: ${{ steps.build.outputs.rootfs_path }}
        run: |
          zstd -19 -T0 --rm -o "${NAME}-rootfs.ext4.zst" "$ROOTFS_PATH"
          ls -lh "${NAME}-rootfs.ext4.zst"

      - name: Compute SHA-256
        if: steps.filter.outputs.skip != 'true'
        id: sha
        env:
          NAME: ${{ steps.build.outputs.name }}
        run: |
          rootfs_sha=$(sha256sum "${NAME}-rootfs.ext4.zst" | cut -d' ' -f1)
          rootfs_size=$(stat -c '%s' "${NAME}-rootfs.ext4.zst")
          {
            echo "rootfs_sha=${rootfs_sha}"
            echo "rootfs_size=${rootfs_size}"
          } >> "$GITHUB_OUTPUT"

      - name: Upload to GitHub Releases (draft)
        if: steps.filter.outputs.skip != 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ steps.release.outputs.tag }}
          NAME: ${{ steps.build.outputs.name }}
          FORCE_OVERWRITE: ${{ inputs.force_overwrite }}
        run: |
          if ! gh release view "$TAG" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
            gh release create "$TAG" \
              --repo "$GITHUB_REPOSITORY" \
              --draft \
              --title "Published images $TAG" \
              --notes "Auto-generated draft release for SmolVM published images. Verify SHA-256 sums and content before publishing." \
              || echo "Draft already exists (race with another matrix cell), continuing."
          fi

          # Default (no --clobber): `gh release upload` returns non-zero
          # on a same-name collision. Forces the dev to bump
          # IMAGES_RELEASE_TAG (or pass a fresh `release_tag` input)
          # rather than silently swapping published bytes that the
          # shipped CLI's MANIFEST SHAs depend on.
          # `force_overwrite=true` opts back in for intentional re-bakes.
          upload_args=()
          if [ "${FORCE_OVERWRITE:-false}" = "true" ]; then
            upload_args+=(--clobber)
          fi
          gh release upload "$TAG" \
            --repo "$GITHUB_REPOSITORY" \
            "${upload_args[@]}" \
            "${NAME}-rootfs.ext4.zst"

      - name: Step summary
        if: steps.filter.outputs.skip != 'true'
        env:
          NAME: ${{ steps.build.outputs.name }}
          TAG: ${{ steps.release.outputs.tag }}
          ROOTFS_SHA: ${{ steps.sha.outputs.rootfs_sha }}
          ROOTFS_SIZE: ${{ steps.sha.outputs.rootfs_size }}
        run: |
          {
            echo "## Build summary: \`${NAME}\`"
            echo ""
