name: Publish Dashboard UI Dist

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write

jobs:
  publish-dashboard-dist:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          persist-credentials: false

      - name: Set up Node.js # zizmor: ignore[cache-poisoning]
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: ui/package-lock.json

      - name: Install UI dependencies
        run: npm ci --prefix ui

      - name: Build dashboard UI
        run: npm run build --prefix ui

      - name: Package dashboard dist
        env:
          REF_NAME: ${{ github.ref_name }}
        run: |
          tar -C ui -czf "smolvm-dashboard-ui-${REF_NAME}.tar.gz" dist

      - name: Upload release asset
        env:
          GH_TOKEN: ${{ github.token }}
          REF_NAME: ${{ github.ref_name }}
        run: |
          if ! gh release view "${REF_NAME}" >/dev/null 2>&1; then
            gh release create "${REF_NAME}" \
              --verify-tag \
              --title "${REF_NAME}" \
              --generate-notes
          fi
          gh release upload "${REF_NAME}" "smolvm-dashboard-ui-${REF_NAME}.tar.gz" --clobber
