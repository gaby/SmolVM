# Build SmolVM's microvm Linux kernel and upload it to the GitHub
# Release named by published.py::IMAGES_RELEASE_TAG.
#
# Decoupled from build-published-images.yml on purpose: kernel cadence
# differs from rootfs cadence. This workflow re-runs only when the inputs
# in kernel/microvm/ change (linux.version, config.*.fragment, build.sh)
# — not every time a preset's tools update.
#
# Output assets per arch (one source build, two formats — see
# kernel/microvm/README.md):
#   vmlinux-<arch>.elf      — ELF, for Firecracker / libkrun
#   vmlinux-<arch>.image    — boot wrapper (bzImage / Image), for QEMU
#   vmlinux-<arch>.config   — resolved .config (debugging aid)
#
# These artifacts are preset-independent (one kernel boots all presets).

name: Build microvm Kernel

on:
  workflow_dispatch:
    inputs:
      release_tag:
        description: >-
          Release tag to upload to (e.g. images-v0.0.14a0). Created as a
          draft if missing. Leave empty to use IMAGES_RELEASE_TAG from
          published.py.
        type: string
        default: ""
  push:
    paths:
      - "kernel/microvm/**"
      - ".github/workflows/build-microvm-kernel.yml"
    branches:
      - main

permissions:
  contents: write  # required to create/upload to GitHub Releases

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        arch: [amd64, arm64]
    runs-on: ${{ matrix.arch == 'arm64' && 'ubuntu-24.04-arm' || 'ubuntu-latest' }}
    timeout-minutes: 60

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Install build dependencies
        run: |
          # bc, flex, bison, libelf-dev, libssl-dev are required by the
          # Linux kernel build. ubuntu-latest already has most of them but
          # libelf-dev + a couple others aren't preinstalled.
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
              bc bison flex libelf-dev libssl-dev xz-utils

      - name: Cache built kernel by input hash
        id: cache
        uses: actions/cache@v4
        with:
          # Cached artifact lives next to the workflow's checkout dir. Keyed
          # on the inputs alone — same Linux + same fragment + same script
          # produces the same kernel byte-for-byte (modulo nondeterminism
          # we'd want to track separately if it bites).
          path: kernel-out
          key: linux-kernel-${{ matrix.arch }}-${{ hashFiles('kernel/microvm/linux.version', 'kernel/microvm/linux.sha256', 'kernel/microvm/config.fragment', 'kernel/microvm/config.amd64.fragment', 'kernel/microvm/config.arm64.fragment', 'kernel/microvm/build.sh') }}

      - name: Build kernel
        if: steps.cache.outputs.cache-hit != 'true'
        env:
          OUT_DIR: ${{ github.workspace }}/kernel-out
          SMOLVM_ARCH_OVERRIDE: ${{ matrix.arch }}
        run: |
          mkdir -p "$OUT_DIR"
          bash kernel/microvm/build.sh

      - name: Sanity-check artifacts
        run: |
          ELF="kernel-out/vmlinux-${{ matrix.arch }}.elf"
          IMAGE="kernel-out/vmlinux-${{ matrix.arch }}.image"
          for f in "$ELF" "$IMAGE"; do
            test -f "$f" || { echo "missing: $f"; exit 1; }
            # Kernel images are MBs, not bytes. Catches the silent
            # "build produced an empty file" failure mode.
            size=$(stat -c '%s' "$f")
            test "$size" -gt 1000000 || { echo "$f is suspiciously small ($size bytes)"; exit 1; }
          done
          file "$ELF" "$IMAGE"
          ls -lh kernel-out/

      - name: Resolve release tag
        id: release
        env:
          INPUT_TAG: ${{ inputs.release_tag }}
        run: |
          if [ -n "${INPUT_TAG:-}" ]; then
            tag="$INPUT_TAG"
          else
            # Single source of truth — published.py::IMAGES_RELEASE_TAG.
            # Doesn't auto-track pyproject version; bumped only when image
            # artifacts are republished (see published.py docstring).
            tag=$(python3 -c 'import sys; sys.path.insert(0, "src"); from smolvm.images.published import IMAGES_RELEASE_TAG; print(IMAGES_RELEASE_TAG)')
          fi
          echo "tag=${tag}" >> "$GITHUB_OUTPUT"
          echo "Release tag: ${tag}"

      - name: Compute SHA-256
        id: sha
        env:
          ARCH: ${{ matrix.arch }}
        run: |
          elf_sha=$(sha256sum "kernel-out/vmlinux-${ARCH}.elf" | cut -d' ' -f1)
          elf_size=$(stat -c '%s' "kernel-out/vmlinux-${ARCH}.elf")
          image_sha=$(sha256sum "kernel-out/vmlinux-${ARCH}.image" | cut -d' ' -f1)
          image_size=$(stat -c '%s' "kernel-out/vmlinux-${ARCH}.image")
          {
            echo "elf_sha=${elf_sha}"
            echo "elf_size=${elf_size}"
            echo "image_sha=${image_sha}"
            echo "image_size=${image_size}"
          } >> "$GITHUB_OUTPUT"

      - name: Upload to GitHub Releases (draft)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ steps.release.outputs.tag }}
          ARCH: ${{ matrix.arch }}
        run: |
          # Idempotent draft create. Race between matrix cells handled the
          # same way as build-published-images.yml.
          if ! gh release view "$TAG" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
            gh release create "$TAG" \
              --repo "$GITHUB_REPOSITORY" \
              --draft \
              --title "Published images $TAG" \
              --notes "Auto-generated draft release for SmolVM published images. Verify SHA-256 sums and content before publishing." \
              || echo "Draft already exists (race with another matrix cell), continuing."
          fi
          # --clobber overwrites prior artifacts. NOTE: allows silent SHA
          # drift relative to BASE_KERNELS — drift detection via live SHA
          # smoke test is a separate workflow.
          gh release upload "$TAG" \
            --repo "$GITHUB_REPOSITORY" \
            --clobber \
            "kernel-out/vmlinux-${ARCH}.elf" \
            "kernel-out/vmlinux-${ARCH}.image" \
            "kernel-out/vmlinux-${ARCH}.config"

      - name: Step summary
        env:
          ARCH: ${{ matrix.arch }}
          TAG: ${{ steps.release.outputs.tag }}
          ELF_SHA: ${{ steps.sha.outputs.elf_sha }}
          ELF_SIZE: ${{ steps.sha.outputs.elf_size }}
          IMAGE_SHA: ${{ steps.sha.outputs.image_sha }}
          IMAGE_SIZE: ${{ steps.sha.outputs.image_size }}
          CACHE_HIT: ${{ steps.cache.outputs.cache-hit }}
        run: |
          {
            echo "## microvm kernel build: \`${ARCH}\`"
            echo ""
            echo "Uploaded to draft release [\`${TAG}\`](https://github.com/${GITHUB_REPOSITORY}/releases/tag/${TAG})."
            echo ""
            echo "| Artifact | Size | SHA-256 |"
            echo "| --- | --- | --- |"
            echo "| \`vmlinux-${ARCH}.elf\` (Firecracker) | $(numfmt --to=iec-i --suffix=B ${ELF_SIZE}) | \`${ELF_SHA}\` |"
            echo "| \`vmlinux-${ARCH}.image\` (QEMU) | $(numfmt --to=iec-i --suffix=B ${IMAGE_SIZE}) | \`${IMAGE_SHA}\` |"
            echo ""
            echo "Linux version: \`$(cat kernel/microvm/linux.version)\` · Cache hit: \`${CACHE_HIT}\`"
          } >> "$GITHUB_STEP_SUMMARY"
