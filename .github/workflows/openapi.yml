name: TS client auto-gen sync

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  drift:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Set up Python 3.13
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install uv
        uses: astral-sh/setup-uv@caf0cab7a618c569241d31dcd442f54681755d39

      - name: Install dependencies
        run: uv sync --extra dashboard

      - name: Re-dump the OpenAPI spec
        run: uv run python scripts/dump_openapi.py

      - name: Fail if the committed spec is stale
        run: |
          if ! git diff --exit-code -- ts/openapi.json; then
            echo "::error::ts/openapi.json is out of date. Run 'npm run sync' in ts/ and commit the result."
            exit 1
          fi
