# Real-KVM end-to-end smoke of the public SmolVM API.
#
# Unlike the unit suite (which mocks the hypervisor) and smoke-published-images
# (which shells out to raw qemu), this boots actual micro-VMs *through the
# SmolVM Python API* and walks their lifecycle — start, exec, file
# upload/download, pause/resume, snapshot/restore, stop/cleanup, and direct
# bridge connectivity. QEMU and Firecracker are both exercised over SSH and vsock.
#
# GH-hosted ubuntu-latest (x86) exposes /dev/kvm, so this runs with hardware
# acceleration. The suite gates review-ready PRs and pushes to main; the
# nightly cron still runs to catch runner/environment drift on days with no PRs,
# and it can be launched manually.

name: E2E (real KVM)

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened, ready_for_review]
  schedule:
    # 03:17 UTC nightly (off the top of the hour to dodge cron congestion).
    - cron: "17 3 * * *"
  workflow_dispatch:

# A real-KVM run takes a runner slot for ~1.5 min; on stacked PR pushes, cancel
# the in-flight run so only the newest commit is verified. Keyed per ref so PRs,
# the nightly cron, and manual dispatches don't cancel each other across refs.
concurrency:
  group: e2e-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  e2e:
    if: ${{ github.event_name != 'pull_request' || github.event.pull_request.draft == false }}
    name: ${{ matrix.backend }}
    runs-on: ubuntu-latest
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        backend: [qemu, firecracker]

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Resolve image release fallback
        id: image_release_fallback
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          source_tag=$(awk -F'"' '/^IMAGES_RELEASE_TAG[[:space:]]*=/{print $2; exit}' src/smolvm/images/published.py)
          if [ -z "$source_tag" ]; then
            echo "ERROR: IMAGES_RELEASE_TAG could not be parsed from src/smolvm/images/published.py" >&2
            exit 1
          fi

          published_tag=$(
            gh api "/repos/${{ github.repository }}/releases?per_page=100" \
              --jq ".[] | select(.tag_name == \"$source_tag\" and .draft == false and .prerelease == false) | .tag_name" \
              | head -n1
          )
          if [ "$published_tag" = "$source_tag" ]; then
            echo "tag=" >> "$GITHUB_OUTPUT"
            echo "Using pinned published image release: $source_tag"
            exit 0
          fi

          fallback=$(
            gh api "/repos/${{ github.repository }}/releases?per_page=100" \
              --jq '[.[] | select(.draft == false and .prerelease == false) | .tag_name | select(startswith("images-"))][0]'
          )
          if [[ -z "$fallback" || "$fallback" == "null" ]]; then
            echo "No published images-* GitHub Release was found for E2E fallback." >&2
            exit 1
          fi
          gh api \
            -H "Accept: application/vnd.github.raw" \
            "/repos/${{ github.repository }}/contents/src/smolvm/images/published.py?ref=$fallback" \
            > src/smolvm/images/published.py
          echo "tag=" >> "$GITHUB_OUTPUT"
          echo "Pinned image release $source_tag is not public yet; using published-image catalog from $fallback"

      - name: Set up Python 3.13
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-unknown-linux-musl

      - name: Cache Rust build
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: rust-${{ runner.os }}-${{ hashFiles('Cargo.lock', 'Cargo.toml', 'smolvm-core/Cargo.toml', 'guest-agent/Cargo.toml') }}
          restore-keys: rust-${{ runner.os }}-

      - name: Install uv
        uses: astral-sh/setup-uv@caf0cab7a618c569241d31dcd442f54681755d39 # v3.2.4

      - name: Install QEMU + tooling
        if: matrix.backend == 'qemu'
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
              qemu-system-x86 qemu-utils openssh-client

      - name: Install Firecracker + tooling
        if: matrix.backend == 'firecracker'
        run: |
          sudo bash scripts/system-setup.sh \
            --configure-runtime \
            --runtime-user "$USER"

      - name: Install bridge test tooling
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends iproute2 iputils-ping

      - name: Enable KVM and optional vsock
        run: |
          # The runner user isn't in the active kvm group for this already-
          # running job. Add it to /etc/group, set the devices to the same
          # root:kvm mode used by system setup, then run KVM commands below via
          # `sudo -u "$USER" -g kvm` so the group is active for each command.
          sudo groupadd -f kvm
          sudo usermod -a -G kvm "$USER" || true
          sudo chgrp kvm /dev/kvm || true
          sudo chmod 660 /dev/kvm || true
          if [[ "${{ matrix.backend }}" == "qemu" ]]; then
            sudo modprobe vhost_vsock || echo "vhost_vsock unavailable; vsock tests will skip"
            # /dev/vhost-vsock ships as root:kvm mode 660; the `usermod` above
            # doesn't apply to this already-running job, so normalize the
            # device and run pytest with the kvm group active below.
            sudo chgrp kvm /dev/vhost-vsock || true
            sudo chmod 660 /dev/vhost-vsock || true
          fi
          ls -l /dev/kvm /dev/vhost-vsock || true

      # uv workspace builds smolvm-core from the local smolvm-core/ directory.
      - name: Install dependencies
        run: uv sync --extra dev

      - name: Assert native extension available
        run: |
          sudo -n -E -u "$USER" -g kvm -- env "PATH=$PATH" "$(command -v uv)" run python -c "from smolvm_core import network; assert network.available(), 'Native extension reports native networking unavailable on Linux'; print('smolvm-core: OK')"

      - name: Diagnostics (smolvm doctor)
        run: sudo -n -E -u "$USER" -g kvm -- env "PATH=$PATH" "$(command -v uv)" run smolvm doctor --backend "${{ matrix.backend }}" || true

      - name: Run e2e suite
        env:
          SMOLVM_IMAGES_RELEASE_TAG: ${{ steps.image_release_fallback.outputs.tag }}
        run: sudo -n -E -u "$USER" -g kvm -- env "PATH=$PATH" "SMOLVM_IMAGES_RELEASE_TAG=${SMOLVM_IMAGES_RELEASE_TAG:-}" "$(command -v uv)" run pytest -m e2e tests/e2e -v --e2e-backend "${{ matrix.backend }}"

      - name: Dump VM logs on failure
        if: failure()
        run: |
          echo "## e2e failed — recent VM/runtime logs" >> "$GITHUB_STEP_SUMMARY"
          # SmolVM writes per-VM logs to <data_dir>/<vm_id>.log. data_dir resolves
          # (see resolve_data_dir / _candidate_data_dirs in smolvm/vm.py) to
          # $SMOLVM_DATA_DIR, else ${XDG_STATE_HOME:-$HOME/.local/state}/smolvm,
          # else /var/lib/smolvm. (~/.smolvm holds image/key logs — kept too.)
          for d in \
              "$SMOLVM_DATA_DIR" \
              "${XDG_STATE_HOME:-$HOME/.local/state}/smolvm" \
              "/var/lib/smolvm" \
              "$HOME/.smolvm"; do
            [ -n "$d" ] && [ -d "$d" ] || continue
            echo "### $d" >> "$GITHUB_STEP_SUMMARY"
            find "$d" -name "*.log" -type f 2>/dev/null | while read -r f; do
              echo "<details><summary>$f</summary>" >> "$GITHUB_STEP_SUMMARY"
              echo '```' >> "$GITHUB_STEP_SUMMARY"
              tail -100 "$f" >> "$GITHUB_STEP_SUMMARY" 2>/dev/null || true
              echo '```' >> "$GITHUB_STEP_SUMMARY"
              echo "</details>" >> "$GITHUB_STEP_SUMMARY"
            done
          done
