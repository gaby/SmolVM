name: Run Tests

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: read

jobs:
  pytest:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Set up Python 3.13
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust build
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: rust-${{ runner.os }}-${{ hashFiles('Cargo.lock', 'Cargo.toml', 'smolvm-core/Cargo.toml', 'guest-agent/Cargo.toml') }}
          restore-keys: rust-${{ runner.os }}-

      - name: Install uv
        uses: astral-sh/setup-uv@caf0cab7a618c569241d31dcd442f54681755d39 # v3.2.4

      # uv workspace resolves smolvm-core from local smolvm-core/ directory
      - name: Install dependencies
        run: uv sync --extra dev

      - name: Assert native extension available
        run: |
          uv run python -c "
          from smolvm.host._accel import HAS_NETLINK
          assert HAS_NETLINK, 'smolvm-core not loaded'
          from smolvm_core import network
          assert network.available(), 'Native extension reports native networking unavailable on Linux'
          print('smolvm-core: OK')
          "

      - name: Run pytest
        run: uv run pytest

      - name: Run Rust guest-agent tests
        run: cargo test -p smolvm-guest-agent

  package-smoke:
    runs-on: ubuntu-latest
    env:
      UV_CACHE_DIR: /tmp/uv-cache

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Set up Python 3.13
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust build
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: rust-${{ runner.os }}-${{ hashFiles('Cargo.lock', 'Cargo.toml', 'smolvm-core/Cargo.toml', 'guest-agent/Cargo.toml') }}
          restore-keys: rust-${{ runner.os }}-

      - name: Install uv
        uses: astral-sh/setup-uv@caf0cab7a618c569241d31dcd442f54681755d39 # v3.2.4

      - name: Build release artifacts
        run: |
          uv build --package smolvm-core --wheel --out-dir smolvm-core/dist
          uv build --package smolvm --wheel --out-dir dist

      - name: Smoke test built wheels
        run: |
          # Read smolvm version and the smolvm-core version it depends on.
          # smolvm and smolvm-core are released independently, so we pull the
          # expected core version from the
          # pyproject dependency string rather than assuming lockstep.
          eval "$(python3 - <<'PY'
          import re
          import tomllib
          from pathlib import Path

          data = tomllib.loads(Path("pyproject.toml").read_text())
          version = data["project"]["version"]

          core_dep = next(
              (
                  d
                  for d in data["project"]["dependencies"]
                  if re.match(r"^smolvm-core(\s|[<>=!~]|$)", d)
              ),
              None,
          )
          assert core_dep is not None, "pyproject must declare a smolvm-core dependency"
          m = re.search(r"(\d+\.\d+\.\d+(?:[a-zA-Z0-9.\-]*)?)", core_dep)
          assert m is not None, f"could not parse version from {core_dep!r}"
          print(f"VERSION={version}")
          print(f"CORE_VERSION={m.group(1)}")
          PY
          )"

          uv venv .smoke-venv --python 3.13
          uv pip install \
            --python .smoke-venv/bin/python3 \
            --find-links smolvm-core/dist \
            --find-links dist \
            "smolvm==${VERSION}"

          .smoke-venv/bin/python3 - <<PY
          import os
          import platform
          import subprocess
          from pathlib import Path
          from importlib.metadata import version as pkg_version

          from smolvm.host._accel import HAS_NETLINK
          from smolvm.host.setup import detect_setup_platform, resolve_setup_script
          from smolvm.images import builder as image_builder

          assert pkg_version("smolvm") == "${VERSION}"
          assert pkg_version("smolvm-core") == "${CORE_VERSION}"
          if platform.system() == "Linux":
              assert HAS_NETLINK, "smolvm-core native extension did not load from built wheel"
          setup_script = resolve_setup_script(detect_setup_platform())
          assert setup_script.is_file(), f"setup script missing from wheel: {setup_script}"

          assets_dir = Path(
              subprocess.check_output(
                  [".smoke-venv/bin/smolvm", "setup", "--assets-dir"],
                  text=True,
              ).strip()
          )
          assert assets_dir.resolve() == setup_script.parent.resolve()
          for helper in (
              "configure-runtime-sudoers.sh",
              "image-build-loopfs.sh",
              "install-firecracker.sh",
          ):
              helper_path = assets_dir / "internal" / helper
              assert helper_path.is_file(), f"missing packaged helper: {helper_path}"

          os.environ.pop("SMOLVM_GUEST_AGENT_BINARY", None)
          assert not image_builder._has_guest_agent_source_checkout()
          release_downloads = []
          expected_agent = Path("/tmp/fake-smolvm-guest-agent")

          def fake_download_guest_agent_binary(image_cache_dir=None):
              release_downloads.append("download")
              return expected_agent

          image_builder._download_guest_agent_binary = fake_download_guest_agent_binary
          assert image_builder._guest_agent_binary() == expected_agent
          assert release_downloads == ["download"]
          print("artifact install: OK")
          PY
