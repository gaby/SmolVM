name: Bug report
description: Report a reproducible problem
title: "[Bug]: "
labels:
  - bug
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting this. Please share enough detail for us to reproduce quickly.
  - type: textarea
    id: what_happened
    attributes:
      label: What happened?
      description: Include the error and actual behavior.
      placeholder: A clear description of the bug.
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: Short, numbered steps.
      placeholder: |
        1. ...
        2. ...
        3. ...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      placeholder: What you expected to happen.
    validations:
      required: true
  - type: input
    id: smolvm_version
    attributes:
      label: SmolVM version or commit
      placeholder: e.g. v0.3.2 or main@<commit>
    validations:
      required: true
  - type: dropdown
    id: environment
    attributes:
      label: Environment
      options:
        - Linux + Firecracker
        - macOS + QEMU
        - Other
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Relevant logs or output
      description: Paste any traceback or `smolvm doctor --json --strict` output.
      render: shell
